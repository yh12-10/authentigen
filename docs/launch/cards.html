<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a}
  .card{
    width:1500px;height:1500px;color:#f5f5f5;font-family:Inter,system-ui,sans-serif;
    display:flex;flex-direction:column;padding:58px 62px;overflow:hidden;position:relative;
    background:
      radial-gradient(120% 80% at 82% 4%, rgba(245,166,35,.10), transparent 52%),
      radial-gradient(100% 80% at 0% 100%, rgba(79,142,247,.06), transparent 52%),
      #0a0a0a;
  }
  header{display:flex;justify-content:space-between;align-items:center;z-index:2}
  .brand{font-family:"DM Serif Display",Georgia,serif;font-size:40px;display:flex;align-items:center;gap:14px}
  .mk{width:36px;height:36px;border-radius:10px;background:#f5a623;box-shadow:0 0 24px rgba(245,166,35,.55)}
  .eyebrow{letter-spacing:.3em;color:#8a8a8a;font-size:21px}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 0;z-index:2}
  footer{text-align:center;color:#8f8f8f;font-size:25px;z-index:2}

  /* before / after compare */
  .compare{display:flex;gap:30px;width:100%;height:100%;align-items:stretch}
  .compare.rows{flex-direction:column}
  .ba{position:relative;flex:1;border-radius:20px;overflow:hidden;border:1px solid rgba(245,166,35,.22);
    box-shadow:0 36px 80px -44px #000}
  .ba img{width:100%;height:100%;object-fit:cover;display:block}
  .ba::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
    background:radial-gradient(120% 100% at 50% 0%, transparent 76%, rgba(8,8,8,.34))}
  .pill{position:absolute;top:20px;left:20px;padding:9px 18px;border-radius:999px;font-size:21px;
    font-weight:700;letter-spacing:.08em;background:rgba(10,10,10,.72);z-index:3}
  .pill.red{color:#ff6b6b;border:1.5px solid rgba(255,107,107,.55)}
  .pill.gold{color:#f5a623;border:1.5px solid rgba(245,166,35,.6)}
  .arrow{align-self:center;flex:0 0 auto;width:70px;height:70px;border-radius:50%;background:#0a0a0a;
    border:1.5px solid rgba(245,166,35,.5);color:#f5a623;display:flex;align-items:center;justify-content:center;
    font-size:38px;box-shadow:0 0 28px rgba(245,166,35,.3);z-index:5;margin:-46px 0}
  .compare.rows .arrow{margin:0 -46px}

  /* hero */
  .hero{text-align:center;max-width:1180px;margin:auto}
  .hero .kicker{color:#f5a623;letter-spacing:.34em;font-size:25px;margin-bottom:30px;font-weight:600}
  .hero h1{font-family:"DM Serif Display",Georgia,serif;font-size:156px;line-height:1}
  .hero h1 .gold{color:#f5a623;font-style:italic}
  .hero .tag{font-size:36px;color:#d2d2d2;margin:36px auto 0;max-width:880px;line-height:1.45}
  .hero .chips{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:48px}
  .hero .chips span{border:1px solid rgba(245,166,35,.35);color:#ededed;padding:13px 24px;border-radius:999px;
    font-size:23px;background:rgba(245,166,35,.06)}
</style>
</head>
<body>
<div class="card">
  <header>
    <div class="brand"><span class="mk"></span> AuthentiGen</div>
    <div class="eyebrow" id="eyebrow">HUMANIZATION</div>
  </header>
  <main id="stage"></main>
  <footer>Open-source AI image humanizer · github.com/yh12-10/authentigen</footer>
</div>
<script>
  var BASE = "../humanization-deck/images";
  var WIN = { portrait: "heavy", product: "medium", landscape: "heavy" };
  var LAYOUT = { portrait: "cols", product: "cols", landscape: "rows" };
  var ARROW = { cols: "→", rows: "↓" };

  function render() {
    var h = (location.hash || "#hero").slice(1);
    var stage = document.getElementById("stage");
    var eyebrow = document.getElementById("eyebrow");
    if (h === "hero") {
      eyebrow.textContent = "v3.0.0";
      stage.innerHTML =
        '<div class="hero">' +
        '<div class="kicker">OPEN SOURCE · SELF-HOSTABLE</div>' +
        '<h1>Authenti<span class="gold">Gen</span></h1>' +
        '<p class="tag">Give AI-generated images the fingerprint of a real camera — sensor grain, lens optics, and film character, applied by a deterministic pixel pipeline.</p>' +
        '<div class="chips"><span>13-step pixel pipeline</span><span>Light · Medium · Heavy</span><span>MIT licensed</span><span>Docker one-command</span></div>' +
        "</div>";
      return;
    }
    var layout = LAYOUT[h] || "cols";
    eyebrow.textContent = h.toUpperCase();
    stage.innerHTML =
      '<div class="compare ' + layout + '">' +
      '<figure class="ba"><img src="' + BASE + "/" + h + '-original.jpg"><figcaption class="pill red">AI-GENERATED</figcaption></figure>' +
      '<div class="arrow">' + ARROW[layout] + "</div>" +
      '<figure class="ba"><img src="' + BASE + "/" + h + "-" + WIN[h] + '.jpg"><figcaption class="pill gold">HUMANIZED</figcaption></figure>' +
      "</div>";
  }
  window.addEventListener("hashchange", render);
  render();
</script>
</body>
</html>
